<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои проекты</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1e1e2f, #2b5876);
            font-family: Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: flex-start;

            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            margin-top: 80px;
        }

        h1 {
            color: white;
            font-size: 64px;
            font-weight: bold;

            text-shadow:
                0 0 5px rgba(255,255,255,0.9),
                0 0 10px rgba(255,255,255,0.8),
                0 0 20px rgba(255,255,255,0.7),
                0 0 40px rgba(255,255,255,0.5);

            animation: fadeDown 1.5s ease;

            margin-bottom: 20px;
        }

        p {
            color: rgba(255,255,255,0.9);
            font-size: 28px;
            animation: fadeUp 2s ease;
        }

        .subtitle {
            margin-top: 20px;
            color: rgba(255,255,255,0.75);
            font-size: 22px;
            max-width: 800px;
            line-height: 1.5;
            animation: fadeUp 2.5s ease;
        }

        .socials {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            animation: fadeUp 3s ease;
        }

        .socials a {
            text-decoration: none;
            color: white;
            padding: 14px 28px;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 14px;
            transition: 0.3s;
            font-size: 18px;
            background: rgba(255,255,255,0.05);
        }

        .socials a:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>Мои проекты</h1>

        <p>
            Привет! это я MIRJIL или Влад.
        </p>

        <div class="subtitle">
            здесь ты сможешь ознакомиться с моими работами
            или зайти на мои соцсети
        </div>

        <div class="socials">
            <a href="https://t.me/VapqjZ" target="_blank">Telegram</a>
            <a href="https://github.com/" target="_blank">GitHub</a>
            <a href="https://youtube.com/@MIRJIL-v9y" target="_blank">YouTube</a>
        </div>

    </div>

</body>
</html>
