<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои проекты</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: #111827;
            font-family: Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: flex-start;

            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            margin-top: 80px;
        }

        h1 {
            color: white;
            font-size: 64px;
            font-weight: bold;

            text-shadow:
                0 0 5px rgba(255,255,255,0.4),
                0 0 10px rgba(255,255,255,0.25);
            filter: none;

            margin-bottom: 20px;
        }

        p {
            color: rgba(255,255,255,0.9);
            font-size: 28px;
            animation: fadeUp 2s ease;
        }



                        .about-me {
            margin-top: 25px;
            color: rgba(255,255,255,0.9);
            font-size: 24px;
            font-weight: 500;
            line-height: 1.6;
            animation: fadeUp 2.8s ease;
        }

        .socials {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            animation: fadeUp 3s ease;
        }

        .socials a {
            text-decoration: none;
            color: white;
            padding: 14px 28px;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 14px;
            transition: 0.3s;
            font-size: 18px;
            background: rgba(255,255,255,0.05);
        }

        .socials a:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            pointer-events: none;
        }

                                .stars span {
            position: absolute;
            display: block;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255,255,255,0.8);
            animation: fall linear infinite;
            opacity: 0.9;
        }

                .stars span::before,
        .stars span::after {
            display: none;
        }

        .stars span:nth-child(1) {
            left: 10%;
            animation-duration: 8s;
            animation-delay: 0s;
        }

        .stars span:nth-child(2) {
            left: 20%;
            animation-duration: 12s;
            animation-delay: 2s;
        }

        .stars span:nth-child(3) {
            left: 35%;
            animation-duration: 10s;
            animation-delay: 1s;
        }

        .stars span:nth-child(4) {
            left: 50%;
            animation-duration: 14s;
            animation-delay: 3s;
        }

        .stars span:nth-child(5) {
            left: 65%;
            animation-duration: 9s;
            animation-delay: 2s;
        }

        .stars span:nth-child(6) {
            left: 75%;
            animation-duration: 11s;
            animation-delay: 4s;
        }

        .stars span:nth-child(7) {
            left: 85%;
            animation-duration: 13s;
            animation-delay: 1s;
        }

        .stars span:nth-child(8) {
            left: 95%;
            animation-duration: 15s;
            animation-delay: 5s;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(120vh);
                opacity: 0;
            }
        }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(120vh);
                opacity: 0;
            }
        }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>

        <span></span>

        <span></span>
        <span></span>
    </div>

        </div>

    </div>

</body>
